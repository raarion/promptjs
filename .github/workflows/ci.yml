name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: lint • test • smoke (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Node 20 is EOL (since 2025-10); we target current maintained LTS lines.
        node: ['22.x', '24.x']

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Use Node ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Type check (JSDoc + checkJs per-file)
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Smoke compile (CLI end-to-end)
        run: |
          printf 'Buat ruang:\n    "Hello CI"\n' > smoke.pjs
          node src/cli/index.js compile smoke.pjs --stdout > /dev/null
          rm -f smoke.pjs

      - name: Compile examples (E4)
        run: |
          for f in examples/*.pjs; do
            echo "Compiling $f..."
            node src/cli/index.js compile "$f" --stdout > /dev/null
          done

      - name: Compile multi-page example
        run: |
          for f in examples/multi-page/src/pages/*.pjs; do
            echo "Compiling $f..."
            node src/cli/index.js compile "$f" --stdout > /dev/null
          done

      - name: Compile demo apps (todo-app + dashboard-app)
        run: |
          # todo-app
          echo "Compiling todo-app..."
          node src/cli/index.js compile examples/todo-app/index.pjs --stdout > /dev/null

          # dashboard-app (SPA with auth)
          for f in examples/dashboard-app/index.pjs examples/dashboard-app/pages/*.pjs; do
            echo "Compiling $f..."
            node src/cli/index.js compile "$f" --stdout > /dev/null
          done
