name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: lint • test • smoke (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Node 18 is EOL (since 2025-04); we target current maintained LTS lines.
        node: ['20.x', '22.x', '24.x']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Smoke compile (CLI end-to-end)
        run: |
          printf 'Buat ruang:\n    "Hello CI"\n' > smoke.pjs
          node src/cli/index.js compile smoke.pjs --stdout > /dev/null
          rm -f smoke.pjs
