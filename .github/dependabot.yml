version: 2
updates:
  # Dev/build dependencies (runtime is zero-dependency; this watches the
  # toolchain: vitest, eslint, prettier, stryker, type defs, etc.).
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps-dev)'
    groups:
      dev-minor-and-patch:
        applies-to: version-updates
        update-types:
          - 'minor'
          - 'patch'

  # Keep GitHub Actions (checkout, setup-node, upload-artifact, CodeQL) current.
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    labels:
      - 'ci'
      - 'dependencies'
    commit-message:
      prefix: 'chore(ci)'
